{% load static %}

<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Booking System</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/"> 🏨 Booking System </a>

        <div>
          <a href="{% url 'search_rooms' %}" class="btn btn-outline-light me-2">
            🔍 Пошук
          </a>

          {% if user.is_authenticated %}

          <a href="{% url 'dashboard' %}" class="btn btn-outline-light me-2">
            👤 Кабінет
          </a>

          {% endif %}

          <a href="/admin/" class="btn btn-outline-light"> ⚙ Admin </a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">{% block content %} {% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
